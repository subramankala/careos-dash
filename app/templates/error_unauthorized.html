{% extends "base.html" %}
{% block content %}
<main class="mx-auto flex min-h-screen max-w-md items-center px-4 py-8">
  <section class="w-full rounded-3xl border border-rose-200 bg-white p-6 shadow-sm">
    <p class="text-xs uppercase tracking-[0.3em] text-rose-500">Access Blocked</p>
    <h1 class="mt-3 text-2xl font-semibold text-slate-900">This dashboard link is no longer authorized.</h1>
    <p class="mt-3 text-sm leading-6 text-slate-600">
      OpenClaw revalidated your caregiver grant at page load and the active authorization no longer matches this link.
    </p>
    <p class="mt-4 text-sm text-slate-500">Request a fresh link if access should still be available.</p>
  </section>
</main>
{% endblock %}
